site_name: Auto Daily Rainfall
site_description: >-
  Using small downloadable vision-language models to extract structured daily
  rainfall data from scanned historical document images.
site_url: https://philip-brohan.github.io/Auto-Daily-Rainfall/
repo_url: https://github.com/philip-brohan/Auto-Daily-Rainfall
repo_name: philip-brohan/Auto-Daily-Rainfall

theme:
  name: material
  palette:
    - scheme: default
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: blue
      accent: light blue
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - attr_list
  - md_in_html
  - tables

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - User Guide:
    - Data Ingest: guide/ingest.md
    - Extraction: guide/extraction.md
    - Fine-tuning: guide/finetuning.md
    - Evaluation: guide/evaluation.md
    - Visualisation: guide/visualisation.md
    - HPC and Azure: guide/hpc-azure.md
  - Reference:
    - CLI Reference: reference/cli.md
    - Configuration: reference/configuration.md
    - Architecture: reference/architecture.md
