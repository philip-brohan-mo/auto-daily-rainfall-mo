site_name: Auto Daily Rainfall
site_description: >-
  Using small downloadable vision-language models to extract structured daily
  rainfall data from scanned historical document images.
site_url: https://Philip-Brohan-MO.github.io/Auto-Daily-Rainfall/
repo_url: https://github.com/Philip-Brohan-MO/Auto-Daily-Rainfall
repo_name: Philip-Brohan-MO/Auto-Daily-Rainfall

theme:
  name: mkdocs

markdown_extensions:
  - admonition
  - tables
  - toc:
      permalink: true
  - fenced_code
  - codehilite:
      guess_lang: false
  - attr_list

nav:
  - Home: index.md
  - Getting Started:
    - Installation: installation.md
    - Quick Start: quickstart.md
  - User Guide:
    - Data Ingest: guide/ingest.md
    - Extraction: guide/extraction.md
    - Fine-tuning: guide/finetuning.md
    - Evaluation: guide/evaluation.md
    - Visualisation: guide/visualisation.md
    - HPC and Azure: guide/hpc-azure.md
  - Reference:
    - CLI Reference: reference/cli.md
    - Configuration: reference/configuration.md
    - Architecture: reference/architecture.md
