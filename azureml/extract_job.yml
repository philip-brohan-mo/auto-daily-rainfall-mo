$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: batch-extract
experiment_name: weather-doc-extractor
description: >
  Run bulk inference (batch-extract) over one shard of the images directory.
  Submit N copies of this job (one per shard) via scripts/aml_submit.sh.

# ── Compute ───────────────────────────────────────────────────────────────────
# Name of your Azure ML compute cluster.  Create one in the Azure ML Studio
# or with: az ml compute create -n gpu-cluster --type amlcompute --min-instances 0
#           --max-instances 8 --size Standard_NC6s_v3 -w <ws> -g <rg>
compute: azureml:gpu-cluster

# ── Environment ───────────────────────────────────────────────────────────────
# Register the environment first:
#   az ml environment create --file azureml/environment.yml -w <ws> -g <rg> --subscription <sub>
environment: azureml:weather-doc-extractor@latest

# ── Code ──────────────────────────────────────────────────────────────────────
# Uploads the repository root to an Azure ML snapshot.
code: ..

# ── Inputs ────────────────────────────────────────────────────────────────────
# Point these at your Azure ML datastore paths (or leave as-is and override
# with --set inputs.images_dir.path=azureml://datastores/... on submission).
inputs:
  images_dir:
    type: uri_folder
    path: azureml://datastores/workspaceblobstore/paths/Daily_rainfall_sample/images
    mode: ro_mount
  checkpoint_dir:
    type: uri_folder
    path: azureml://datastores/workspaceblobstore/paths/Daily_rainfall_sample/images
    mode: ro_mount

# ── Outputs ───────────────────────────────────────────────────────────────────
outputs:
  extractions:
    type: uri_folder
    mode: rw_mount
  # Persistent HuggingFace model cache — shared across all jobs so weights are
  # only downloaded once.  Declared as an output (rw_mount) so the job can
  # write new downloads; pointing all jobs at the same datastore path means
  # subsequent jobs find the weights already cached.
  hf_cache:
    type: uri_folder
    path: azureml://datastores/workspaceblobstore/paths/hf_cache
    mode: rw_mount

# ── Command ───────────────────────────────────────────────────────────────────
# SHARD and TOTAL_SHARDS are set via environment_variables below and can be
# overridden per-submission with: --set environment_variables.SHARD=<n>
# Add --set environment_variables.EXTRACT_LIMIT=5 to process only 5 images.
# PYTHONPATH=src makes the local package importable without pip install.
# WEATHER_CHECKPOINT is set if a checkpoint input is provided; otherwise empty.
command: >-
  export WEATHER_IMAGES_DIR=${{inputs.images_dir}} &&
  export OUTPUT_DIR=${{outputs.extractions}} &&
  export HF_HOME=${{outputs.hf_cache}} &&
  export WEATHER_CHECKPOINT=${{inputs.checkpoint_dir}} &&
  bash scripts/run_extract.sh

# ── Environment variables ─────────────────────────────────────────────────────
environment_variables:
  # PYTHONPATH so the local src/ package is importable without pip install.
  PYTHONPATH: src
  # Number of images per forward pass. Larger = better GPU utilisation but more VRAM.
  # 4 is a safe default for 16GB V100; increase for A100 (40GB).
  BATCH_SIZE: "4"
  SHARD: "1"
  TOTAL_SHARDS: "1"

  # Uncomment to process only N images per shard (useful for smoke tests).
  # EXTRACT_LIMIT: "5"

  # Model to use (required — must be set at submission time via aml_submit.sh --model).
  # "smolvlm" resolves to HuggingFaceTB/SmolVLM-500M-Instruct.
  WEATHER_MODEL: ""

  # HuggingFace token — required for gated models (Gemma 3/4, Llama, etc.).
  # Set HF_TOKEN in azureml/config.env; aml_submit.sh passes it at submission time.
  # Alternatively, store it as a Key Vault secret and uncomment the line below:
  # HF_TOKEN: ${{secrets.hf-token}}

  # Point HuggingFace cache at shared storage so each node does not re-download.
  # Overridden by aml_submit.sh via --set inputs.hf_cache.path=...
