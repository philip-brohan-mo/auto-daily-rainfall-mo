$schema: https://azuremlschemas.azureedge.net/latest/commandJob.schema.json
type: command
display_name: evaluate
experiment_name: weather-doc-extractor
description: >
  Evaluate one shard of paired image/transcription records and write per-shard
  JSON results.  Submit N copies of this job via scripts/aml_submit.sh, then
  aggregate the resulting shard_*_of_*.json files to get overall metrics.

# ── Compute ───────────────────────────────────────────────────────────────────
compute: azureml:gpu-cluster

# ── Environment ───────────────────────────────────────────────────────────────
environment: azureml:weather-doc-extractor@latest

# ── Code ──────────────────────────────────────────────────────────────────────
code: ..

# ── Inputs ────────────────────────────────────────────────────────────────────
inputs:
  images_dir:
    type: uri_folder
    path: azureml://datastores/workspaceblobstore/paths/Daily_rainfall_sample/images
    mode: ro_mount
  transcriptions_dir:
    type: uri_folder
    path: azureml://datastores/workspaceblobstore/paths/Daily_rainfall_sample/transcriptions
    mode: ro_mount

# ── Outputs ───────────────────────────────────────────────────────────────────
# Each shard writes one JSON file here.  After all shards finish, this
# directory contains shard_1_of_N.json … shard_N_of_N.json ready to aggregate.
outputs:
  results:
    type: uri_folder
    mode: rw_mount

# ── Command ───────────────────────────────────────────────────────────────────
command: >-
  pip install -e . --quiet &&
  WEATHER_IMAGES_DIR=${{inputs.images_dir}}
  WEATHER_TRANSCRIPTIONS_DIR=${{inputs.transcriptions_dir}}
  weather-extract evaluate
  --shard $SHARD
  --total-shards $TOTAL_SHARDS
  --output-file ${{outputs.results}}/shard_${SHARD}_of_${TOTAL_SHARDS}.json

# ── Environment variables ─────────────────────────────────────────────────────
environment_variables:
  SHARD: "1"
  TOTAL_SHARDS: "1"

  WEATHER_MODEL: smolvlm

  # HF_HOME: /mnt/blob/hf_cache
