name: weather-doc-extractor-a100
channels:
  - conda-forge
dependencies:
  - python=3.12
  - pip
  - pillow
  - matplotlib
  - pip:
      # PyTorch 2.8 with CUDA 12.6 wheels — satisfies torch>=2.6 (Gemma 3/4).
      # A100 nodes support CUDA 12.6.
      - --extra-index-url https://download.pytorch.org/whl/cu126
      - torch==2.8.0+cu126
      - torchvision==0.23.0+cu126
      - accelerate
      - datasets
      - huggingface_hub
      - num2words
      - peft
      # transformers: Must be >=4.49.0 (SmolVLM2 SmolVLMImageProcessor) and <5.0.0
      # (Granite 4.1 custom modeling code uses 4.x API; 5.x broke create_causal_mask signature)
      # The masking_utils module was added in ~4.46 so any 4.49-4.x release works.
      - transformers>=4.49.0,<5.0.0
      - trl
      - scipy
      - backoff
