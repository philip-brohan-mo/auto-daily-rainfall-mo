name: weather-doc-extractor
channels:
  - conda-forge
dependencies:
  - python=3.11
  - pip
  - pillow
  - matplotlib
  - pip:
      # Pin torch to a CUDA 12.1 wheel explicitly. Without this, pip resolves
      # the torch dependency from accelerate/trl/peft and upgrades to the
      # latest wheel (currently CUDA 12.6+), which breaks on V100 nodes whose
      # driver only supports up to CUDA 12.4.
      - --extra-index-url https://download.pytorch.org/whl/cu121
      - torch==2.2.2+cu121
      - torchvision==0.17.2+cu121
      - accelerate
      - datasets
      - huggingface_hub
      - peft
      # transformers >=4.48 is required for SmolVLM image processor support.
      - transformers>=4.48.0
      - trl
